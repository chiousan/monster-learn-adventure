<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🎮 怪獸學習冒險</title>
<!-- ============================================================
     怪獸學習冒險 v3 — 馬力歐式關卡 × 寶可夢式對戰 × 寒暑假複習/預習
     ● 一～六年級 6 個世界，每世界 12 關（國→數→英循環）＋世界魔王
     ● 開場選「剛讀完幾年級」＋「寒假/暑假」：
         暑假＝複習 N 下學期(偏難) ＋ 預習 N+1 上學期(偏易)
         寒假＝只複習 N 上學期(偏難)；其他世界＝自由挑戰
     ● 題庫：字詞資料庫×題型模板，每科每學期可抽 150+ 題；數學程式生成
     ● RPG 全保留：抓怪/捕獸珠/商店/圖鑑990/升級/陸海空相剋(+30%)
     ● 對戰動畫：衝鋒→招式特效→受擊震動→傷害數字→血條動畫
     ● 想換怪獸圖：images/編號.png（見圖鑑 #號），缺圖自動用內建動物圖
     ============================================================ -->
<style>
  :root{
    --pa-main:#f6b40e; --pa-accent:#2fae60; --pa-dark:#1f8a49;
    --pb-main:#3a6df0; --pb-accent:#7c4dff; --pb-dark:#5c2fd6;
    --ink:#2a2f45; --shadow:0 10px 30px rgba(0,0,0,.16); --radius:20px; --ok:#2fae60; --no:#e2433a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{font-family:"PingFang TC","Heiti TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;color:var(--ink);
    min-height:100dvh;overflow-x:hidden;user-select:none;-webkit-text-size-adjust:100%;background:linear-gradient(135deg,#fff6dd,#e7efff 55%,#efe8ff);}
  body.theme-a{--main:var(--pa-main);--accent:var(--pa-accent);--dark:var(--pa-dark);background:linear-gradient(135deg,#fff6dd,#e8fbe9);}
  body.theme-b{--main:var(--pb-main);--accent:var(--pb-accent);--dark:var(--pb-dark);background:linear-gradient(135deg,#e7efff,#efe8ff);}
  button{font-family:inherit;cursor:pointer;}
  .page{display:none;min-height:100dvh;padding:16px clamp(12px,3vw,40px);animation:fade .3s ease;}
  .page.active{display:flex;flex-direction:column;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .btn{border:none;border-radius:999px;font-weight:900;font-size:clamp(15px,2.3vw,19px);padding:13px 24px;color:#fff;
    background:linear-gradient(120deg,var(--main,#f6b40e),var(--accent,#2fae60));box-shadow:0 6px 16px rgba(0,0,0,.16);transition:transform .12s;}
  .btn:active{transform:scale(.94);} .btn.ghost{background:#fff;color:var(--ink);box-shadow:0 4px 12px rgba(0,0,0,.1);}
  .btn.big{font-size:clamp(17px,2.8vw,22px);padding:16px 30px;} .btn:disabled{opacity:.5;}
  #page-home{align-items:center;justify-content:center;text-align:center;}
  .home-title{font-size:clamp(26px,6vw,50px);font-weight:900;margin:0 0 4px;background:linear-gradient(90deg,#f6b40e,#2fae60,#3a6df0,#7c4dff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .home-sub{font-size:clamp(14px,2.5vw,20px);color:#5a6072;font-weight:800;margin:0 0 26px;}
  .card-wrap{display:flex;gap:clamp(14px,3vw,30px);flex-wrap:wrap;justify-content:center;width:100%;max-width:900px;}
  .role-card{flex:1 1 300px;max-width:420px;min-height:240px;border:none;border-radius:var(--radius);padding:24px 20px;color:#fff;box-shadow:var(--shadow);transition:transform .16s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
  .role-card:active{transform:scale(.96);} .role-card:hover{transform:translateY(-5px);}
  .role-card .emoji{font-size:clamp(54px,10vw,86px);animation:floaty 3s ease-in-out infinite;}
  .role-card .r-title{font-size:clamp(20px,3.4vw,28px);font-weight:900;}
  .role-card .badge{font-size:14px;font-weight:900;background:rgba(255,255,255,.28);padding:5px 14px;border-radius:999px;}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
  .card-a{background:linear-gradient(150deg,var(--pa-main),var(--pa-accent));}
  .card-b{background:linear-gradient(150deg,var(--pb-main),var(--pb-accent));}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .topbar .back{background:#fff;color:var(--ink);border:none;border-radius:999px;font-size:17px;font-weight:900;padding:9px 18px;box-shadow:0 4px 12px rgba(0,0,0,.1);}
  .topbar .back:active{transform:scale(.94);}
  .topbar h2{margin:0;font-size:clamp(16px,3vw,25px);font-weight:900;flex:1;min-width:110px;}
  .pill{background:#fff;border-radius:999px;padding:6px 13px;font-weight:900;font-size:15px;box-shadow:0 4px 12px rgba(0,0,0,.1);white-space:nowrap;}
  .pill.iconbtn{border:none;font-size:17px;}
  /* 世界選單 */
  .world-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;max-width:920px;width:100%;margin:4px auto;}
  .world-card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:3px solid transparent;transition:transform .12s;position:relative;}
  .world-card:active{transform:scale(.985);}
  .world-card.review{border-color:#ff9f43;} .world-card.preview{border-color:#2fae60;}
  .world-card .w-head{display:flex;align-items:center;gap:10px;}
  .world-card .w-emoji{font-size:40px;} .world-card .w-name{font-size:clamp(18px,3vw,24px);font-weight:900;}
  .world-card .w-tag{font-size:12px;font-weight:900;color:#fff;padding:3px 10px;border-radius:999px;}
  .w-tag.t-review{background:#ff9f43;} .w-tag.t-preview{background:#2fae60;} .w-tag.t-free{background:#a3aac2;}
  .world-card .w-prog{font-size:13px;font-weight:800;color:#5a6072;margin-top:8px;}
  .prog-track{height:10px;background:#eef1f8;border-radius:999px;overflow:hidden;margin-top:6px;}
  .prog-track i{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--main),var(--accent));transition:width .4s;}
  /* 關卡地圖（馬力歐式路線） */
  .lv-path{max-width:640px;width:100%;margin:6px auto 30px;display:flex;flex-direction:column;gap:10px;}
  .lv-row{display:flex;justify-content:center;gap:12px;}
  .lv-row.alt{justify-content:center;}
  .lv-node{width:clamp(86px,26vw,120px);border:none;border-radius:18px;background:#fff;box-shadow:0 5px 12px rgba(0,0,0,.12);
    padding:10px 6px;text-align:center;position:relative;transition:transform .12s;}
  .lv-node:active{transform:scale(.95);}
  .lv-node .n-ic{font-size:clamp(26px,7vw,36px);line-height:1.1;}
  .lv-node .n-nm{font-size:clamp(11px,2.2vw,13px);font-weight:900;margin-top:3px;}
  .lv-node .n-stars{font-size:clamp(11px,2.2vw,14px);letter-spacing:1px;color:#f6b40e;min-height:1.2em;}
  .lv-node.locked{opacity:.45;filter:grayscale(.6);}
  .lv-node.cleared{border:3px solid var(--accent);}
  .lv-node.boss{background:linear-gradient(150deg,#fff,#ffd9e6);border:3px solid #ff5c93;width:clamp(110px,34vw,150px);}
  .lv-sub-ch{background:linear-gradient(150deg,#fff,#ffe9c9);} .lv-sub-ma{background:linear-gradient(150deg,#fff,#d5eefb);} .lv-sub-en{background:linear-gradient(150deg,#fff,#e2f7e2);}
  /* 彈窗 */
  .modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(20,16,40,.55);backdrop-filter:blur(5px);}
  .modal.show{display:flex;animation:fade .3s ease;}
  .modal-box{background:#fff;border-radius:22px;padding:clamp(16px,3.5vw,30px);max-width:560px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.4);animation:zoom .4s cubic-bezier(.18,.9,.3,1.2);max-height:94dvh;overflow-y:auto;}
  @keyframes zoom{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
  .tag{display:inline-block;font-size:13px;font-weight:900;color:#fff;background:var(--main,#f6b40e);padding:4px 13px;border-radius:999px;}
  .modal-box h3{font-size:clamp(18px,3.3vw,25px);font-weight:900;margin:10px 0 6px;}
  .q-text{font-size:clamp(18px,3.7vw,27px);font-weight:900;text-align:center;margin:10px 0 12px;min-height:1.3em;}
  .q-progress{text-align:center;font-size:13px;font-weight:800;color:#6b7186;letter-spacing:2px;}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .choice{padding:14px;border-radius:14px;border:3px solid #dfe3ee;background:#f7f9fd;font-size:clamp(16px,3vw,22px);font-weight:900;color:var(--ink);}
  .choice:active{transform:scale(.96);} .choice.ok{background:var(--ok);border-color:var(--ok);color:#fff;} .choice.no{background:var(--no);border-color:var(--no);color:#fff;}
  .modal-actions{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
  .mon-art{width:clamp(90px,26vw,140px);height:clamp(90px,26vw,140px);margin:2px auto;} .mon-art svg,.mon-art img{width:100%;height:100%;object-fit:contain;}
  .mon-name{font-size:clamp(17px,3.2vw,23px);font-weight:900;} .mon-meta{font-size:13px;font-weight:800;color:#5a6072;margin-top:2px;}
  .type-chip{display:inline-block;font-size:12px;font-weight:900;color:#fff;padding:2px 9px;border-radius:999px;}
  .type-land{background:#2fae60;} .type-sea{background:#3aa8f0;} .type-air{background:#7c4dff;}
  /* 設定頁 */
  .setup-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0;}
  .setup-grid .gbtn{padding:16px 6px;border-radius:14px;border:3px solid #dfe3ee;background:#f7f9fd;font-size:19px;font-weight:900;}
  .setup-grid .gbtn.sel{border-color:var(--accent,#2fae60);background:color-mix(in srgb,var(--accent,#2fae60) 14%,#fff);}
  .season-row{display:flex;gap:10px;margin:6px 0 4px;}
  .season-row .gbtn{flex:1;padding:14px;border-radius:14px;border:3px solid #dfe3ee;background:#f7f9fd;font-size:18px;font-weight:900;}
  .season-row .gbtn.sel{border-color:var(--accent,#2fae60);background:color-mix(in srgb,var(--accent,#2fae60) 14%,#fff);}
  /* 對戰舞台與動畫 */
  .arena{position:relative;background:linear-gradient(180deg,#dff1ff 0%,#eafbe7 70%,#d8ecd2 100%);border-radius:18px;padding:14px 10px 8px;overflow:hidden;}
  .vs-wrap{display:flex;align-items:flex-end;justify-content:space-between;gap:6px;position:relative;min-height:130px;}
  .fighter{flex:1;text-align:center;min-width:0;position:relative;z-index:2;}
  .fighter .f-art{width:clamp(78px,22vw,120px);height:clamp(78px,22vw,120px);margin:0 auto;transition:transform .2s;}
  .fighter .f-art svg,.fighter .f-art img{width:100%;height:100%;object-fit:contain;}
  .fighter .f-nm{font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hpbar2{height:12px;border-radius:8px;background:#e6e9f2;overflow:hidden;margin:3px auto;max-width:130px;border:1px solid #cfd4e2;}
  .hpbar2 i{display:block;height:100%;background:linear-gradient(90deg,#39c46b,#a7e86a);transition:width .45s;}
  .hpbar2 i.low{background:linear-gradient(90deg,#e2433a,#ff8a3a);}
  .team-dots{font-size:13px;letter-spacing:2px;} .vs-mid{font-size:20px;font-weight:900;color:var(--dark,#1f8a49);align-self:center;z-index:1;}
  .move-banner{text-align:center;font-size:clamp(13px,2.6vw,16px);font-weight:900;min-height:1.5em;color:var(--dark,#1f8a49);margin-top:4px;}
  .lunge-l{animation:lungeL .55s ease;} .lunge-r{animation:lungeR .55s ease;}
  @keyframes lungeL{35%{transform:translateX(-34px) scale(1.08);}70%{transform:translateX(6px);}}
  @keyframes lungeR{35%{transform:translateX(34px) scale(1.08);}70%{transform:translateX(-6px);}}
  .hit-shake{animation:hitShake .5s ease;}
  @keyframes hitShake{0%,100%{transform:translateX(0);filter:none;}20%{transform:translateX(-8px);filter:brightness(2.2);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);filter:brightness(1.8);}80%{transform:translateX(4px);}}
  .proj{position:absolute;top:38%;font-size:clamp(24px,6vw,34px);z-index:3;pointer-events:none;}
  .proj.go-l{animation:projL .5s linear forwards;} .proj.go-r{animation:projR .5s linear forwards;}
  @keyframes projL{from{left:68%;opacity:1;}to{left:12%;opacity:.9;}}
  @keyframes projR{from{left:26%;opacity:1;}to{left:80%;opacity:.9;}}
  .dmg-float{position:absolute;top:26%;font-size:clamp(20px,5vw,30px);font-weight:900;color:#e2433a;z-index:4;pointer-events:none;animation:dmgUp 1s ease forwards;text-shadow:0 2px 0 #fff;}
  .dmg-float.crit{color:#ff5c00;font-size:clamp(24px,6vw,36px);}
  @keyframes dmgUp{from{transform:translateY(0);opacity:1;}to{transform:translateY(-44px);opacity:0;}}
  /* 商店/圖鑑/隊伍 */
  .shop-item{display:flex;align-items:center;gap:12px;background:#f7f9fd;border-radius:14px;padding:11px 13px;margin:7px 0;}
  .shop-item .s-ic{font-size:32px;} .shop-item .s-body{flex:1;text-align:left;} .shop-item .s-nm{font-weight:900;font-size:16px;} .shop-item .s-desc{font-size:12px;color:#5a6072;font-weight:700;}
  .dex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;}
  .dex-item{background:#f4f6fc;border-radius:12px;padding:6px 3px;text-align:center;} .dex-item.have{background:linear-gradient(150deg,#fff,color-mix(in srgb,var(--accent,#2fae60) 14%,#fff));}
  .dex-art{width:100%;aspect-ratio:1/1;} .dex-art svg,.dex-art img{width:100%;height:100%;object-fit:contain;} .dex-art.unknown{display:flex;align-items:center;justify-content:center;font-size:28px;color:#c3c9da;}
  .dex-nm{font-size:10px;font-weight:800;margin-top:2px;} .dex-lv{font-size:10px;font-weight:900;color:var(--dark,#1f8a49);}
  .party-row{display:flex;align-items:center;gap:10px;background:#f7f9fd;border-radius:12px;padding:8px 10px;margin:6px 0;}
  .party-row .p-art{width:44px;height:44px;} .party-row .p-art svg,.party-row .p-art img{width:100%;height:100%;object-fit:contain;} .party-row .p-body{flex:1;text-align:left;} .party-row .p-nm{font-weight:900;font-size:15px;}
  .party-row .p-sub{font-size:11px;color:#5a6072;font-weight:700;}
  .stars-big{font-size:clamp(28px,7vw,42px);letter-spacing:4px;color:#f6b40e;text-align:center;}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:75;display:none;}
  .reset-hotspot{position:fixed;right:0;bottom:0;width:60px;height:60px;z-index:80;} .reset-hotspot::after{content:"🔒";position:absolute;right:12px;bottom:10px;font-size:14px;opacity:.15;}
  @media (max-width:820px){.role-card{flex:1 1 100%;max-width:520px;min-height:190px;}}
  @media (max-width:420px){.choices{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- 首頁（單人版：每台 iPad 一位訓練家，進度各自儲存） -->
<section id="page-home" class="page active">
  <h1 class="home-title">🎮 怪獸學習冒險</h1>
  <p class="home-sub">✨ 六大年級世界 × 闖關學習 × 收服 990 圖鑑！✨</p>
  <div class="card-wrap">
    <button class="role-card card-a" onclick="startGame()" style="max-width:460px;"><span class="badge" id="p-badge">點我開始</span><span class="emoji">🧚‍♂️</span><span class="r-title">開始冒險</span></button>
  </div>
</section>

<!-- 世界選單 -->
<section id="page-worlds" class="page">
  <div class="topbar">
    <button class="back" onclick="go('page-home')">🏠</button>
    <h2 id="worlds-title">訓練家</h2>
    <button class="pill iconbtn" onclick="openSetup(false)" title="更改年級/季節">⚙️</button>
    <span class="pill">⭐Lv<span id="tr-lvl">1</span></span><span class="pill">🪙<span id="coin-w">0</span></span>
  </div>
  <div class="world-grid" id="world-grid"></div>
  <div class="modal-actions" style="margin-top:14px;">
    <button class="btn ghost" onclick="openParty()">🎒 隊伍</button>
    <button class="btn ghost" onclick="openDex()">📖 圖鑑</button>
    <button class="btn ghost" onclick="openShop(false)">🛒 商店</button>
  </div>
</section>

<!-- 關卡地圖 -->
<section id="page-levels" class="page">
  <div class="topbar">
    <button class="back" onclick="go('page-worlds')">‹ 世界</button>
    <h2 id="lv-title">一年級世界</h2>
    <span class="pill">⭐Lv<span id="tr-lvl2">1</span></span><span class="pill">🪙<span id="coin-l">0</span></span>
  </div>
  <div style="text-align:center;font-size:13px;font-weight:800;color:#6b7186;margin-bottom:6px;" id="lv-subtitle"></div>
  <div class="lv-path" id="lv-path"></div>
</section>

<div class="modal" id="modal"><div class="modal-box" id="modal-box"></div></div>
<div class="modal" id="dex-modal"><div class="modal-box">
  <span class="tag">📖 怪獸圖鑑</span><h3 id="dex-title">已收集 0 / 990</h3>
  <div class="dex-grid" id="dex-grid"></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal('dex-modal')">關閉</button></div>
</div></div>
<div class="modal" id="party-modal"><div class="modal-box">
  <span class="tag">🎒 我的怪獸隊伍</span><h3 id="party-title">共 0 隻</h3>
  <div id="party-list"></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal('party-modal')">關閉</button></div>
</div></div>

<canvas id="confetti"></canvas>
<div class="reset-hotspot" id="reset-hotspot"></div>
<div class="modal" id="reset-modal"><div class="modal-box" style="max-width:400px;text-align:center;">
  <h3>🔒 家長重置</h3><p style="font-weight:700;color:#555c78;line-height:1.6;">清除這位玩家的所有進度？</p>
  <div class="modal-actions"><button class="btn" style="background:linear-gradient(120deg,#ff6b6b,#e23b3b);" onclick="doReset()">✅ 清除</button><button class="btn ghost" onclick="closeModal('reset-modal')">取消</button></div>
</div></div>

<script>
"use strict";
/* ★ 想換怪獸圖：SPECIES_IMAGES[編號]="圖片路徑"；或放 images/編號.png 自動啟用 */
const SPECIES_IMAGES = {};

/* ================= 怪獸系統（沿用 v2：99 種 × 10 級） ================= */
const TYPES = {
  land:{n:"陸",key:"land",hue:120}, sea:{n:"海",key:"sea",hue:205}, air:{n:"空",key:"air",hue:280}
};
const BEATS = { air:"land", land:"sea", sea:"air" };
const ANIMALS = {
  land:["熊","虎","兔","狼","鹿","豬","牛","羊","獅","貓","鼠"],
  sea :["鯉","鯊","龜","蝦","蟹","鯨","豚","章魚","水母","河豚","海馬"],
  air :["鷹","蝶","鳥","蜂","鶴","燕","鴉","鸚","梟","隼","鳳"]
};
const EMOJI = {
  land:["🐻","🐯","🐰","🐺","🦌","🐷","🐮","🐑","🦁","🐱","🐭"],
  sea :["🐟","🦈","🐢","🦐","🦀","🐋","🐬","🐙","🪼","🐡","🐠"],
  air :["🦅","🦋","🐦","🐝","🕊️","🐤","🐧","🦜","🦉","🦆","🦚"]
};
const PREFIX = { land:["泡泡","硬殼","蓬蓬"], sea:["水花","珍珠","深海"], air:["旋風","閃電","彩羽"] };
const SPECIES = [];
["land","sea","air"].forEach(type=>{
  for(let k=0;k<33;k++){
    const id=SPECIES.length;
    SPECIES.push({ id, type, name:PREFIX[type][Math.floor(k/11)]+ANIMALS[type][k%11], emoji:EMOJI[type][k%11],

function mathChoices(a){
  const s=String(a); const set=new Set([s]);
  if(/^-?\d+$/.test(s)){ const v=Number(s); let g=0; while(set.size<4&&g++<80){ const off=rnd(1,Math.max(3,Math.round(Math.abs(v)*0.15)+3))*(Math.random()<.5?1:-1); const c=v+off; if(c>=0||v<0) set.add(String(c)); } }
  else if(s.includes("餘")){ const p=s.split("餘").map(Number); [`${p[0]+1}餘${p[1]}`,`${p[0]}餘${Math.max(0,p[1]-1)}`,`${Math.max(0,p[0]-1)}餘${p[1]+1}`].forEach(x=>set.add(x)); }
  else if(s.includes("/")){ const p=s.split("/").map(Number); [`${p[0]+1}/${p[1]}`,`${Math.max(1,p[0]-1)}/${p[1]}`,`${p[0]}/${p[1]+1}`].forEach(x=>set.add(x)); }
  else if(s.includes(".")){ const v=parseFloat(s); [ (v+0.1).toFixed(1), (v-0.1).toFixed(1), (v+1).toFixed(1) ].forEach(x=>set.add(String(x))); }
  else if(s.includes(":")){ const p=s.split(":").map(Number); [`${p[0]+1}:${p[1]}`,`${p[0]}:${p[1]+1}`,`${p[1]}:${p[0]}`].forEach(x=>set.add(x)); }
  let k=0; while(set.size<4) set.add(s+" "+(++k));
  return shuffle(Array.from(set).slice(0,4));
}

let curQ=null, qCount=0, retryQueue=[];
function scheduleRetry(q,subject){
  const clean=q.q.replace(/^🔁 /,"");
  if(retryQueue.some(r=>r.q.q===clean)) return;
  retryQueue.push({ q:{q:clean,a:q.a,choices:q.choices}, subject, dueAt:qCount+rnd(2,5) });
  if(retryQueue.length>10) retryQueue.shift();
}

function lvPick(arr, lvIdx, bias){
  let pool;
  if(bias==="hard") pool=arr.filter(x=>x[lvIdx]>=2);
  else if(bias==="easy") pool=arr.filter(x=>x[lvIdx]<=2);
  else pool=arr;
  if(!pool.length) pool=arr;
  return pick(pool);
}
function distinctFrom(arr, idx, ans, n){
  const set=new Set(); let guard=0;
  while(set.size<n && guard++<120){ const v=pick(arr)[idx]; if(v && v!==ans) set.add(v); }
  return Array.from(set);
}
function chQ(gs,bias){
  const T=CH[gs]||CH["1s"];
  const roll=Math.random();
  if(roll<0.18 && T.f.length){ const f=lvPick(T.f,3,bias); return {q:f[0],a:f[1],choices:shuffle([f[1],...f[2]])}; }
  const withRad=T.w.filter(x=>x[2]), withAnti=T.w.filter(x=>x[3]);
  if(roll<0.36 && withAnti.length>=4){ const e=lvPick(withAnti,4,bias); return {q:`「${e[0]}」的相反是？`,a:e[3],choices:shuffle([e[3],...distinctFrom(withAnti,3,e[3],3)])}; }
  if(roll<0.55 && withRad.length>=4){ const e=lvPick(withRad,4,bias); return {q:`「${e[0]}」的部首是？`,a:e[2],choices:shuffle([e[2],...distinctFrom(withRad,2,e[2],3)])}; }
  if(roll<0.78){ const e=lvPick(T.w,4,bias); return {q:`「${e[0]}」的注音是？`,a:e[1],choices:shuffle([e[1],...distinctFrom(T.w,1,e[1],3)])}; }
  const e=lvPick(T.w,4,bias); return {q:`${e[1]} 是哪個字？`,a:e[0],choices:shuffle([e[0],...distinctFrom(T.w,0,e[0],3)])};
}
function enQ(gs,bias){
  const T=EN[gs]||EN["1s"];
  const roll=Math.random();
  if(roll<0.15 && T.s.length){ const s=lvPick(T.s,3,bias); return {q:s[0],a:s[1],choices:shuffle([s[1],...s[2]])}; }
  if(roll<0.45){ const e=lvPick(T.w,2,bias); return {q:`${e[0]} 的中文是？`,a:e[1],choices:shuffle([e[1],...distinctFrom(T.w,1,e[1],3)])}; }
  if(roll<0.75){ const e=lvPick(T.w,2,bias); return {q:`「${e[1]}」的英文是？`,a:e[0],choices:shuffle([e[0],...distinctFrom(T.w,0,e[0],3)])}; }
  // 拼字缺字母
  const cand=T.w.filter(x=>x[0].length>=3 && !x[0].includes(" "));
  const e=lvPick(cand.length?cand:T.w,2,bias);
  const w=e[0]; const i=rnd(1,w.length-2); const shown=w.slice(0,i)+"_"+w.slice(i+1);
  const wrong=new Set(); let g=0;
  while(wrong.size<3&&g++<40){ const c="abcdefghijklmnoprstuw"[rnd(0,20)]; if(c!==w[i]) wrong.add(c); }
  return {q:`${shown}（${e[1]}）缺哪個字母？`,a:w[i],choices:shuffle([w[i],...Array.from(wrong)])};
}
function mathQ(gs,bias){
  const gens=MATH[gs]||MATH["1s"];
  let idx;
  if(bias==="hard") idx=pick([1,2]); else if(bias==="easy") idx=pick([0,1]); else idx=rnd(0,2);
  const r=gens[idx]();
  return {q:r.q,a:String(r.a),choices:mathChoices(r.a)};
}
let curSubject="math";   // 目前出題科目（供錯題重練歸類）
function nextQ(subject,gs,bias){
  qCount++; curSubject=subject;
  const i=retryQueue.findIndex(r=>r.subject===subject && qCount>=r.dueAt);
  if(i>=0){ const r=retryQueue.splice(i,1)[0]; return {q:"🔁 "+r.q.q,a:r.q.a,choices:shuffle(r.q.choices)}; }
  if(subject==="math") return mathQ(gs,bias);
  if(subject==="chinese") return chQ(gs,bias);
  return enQ(gs,bias);
}

/* ================= 音效 ================= */
const SFX=(()=>{ let ac=null,on=true;
  function ctx(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ on=false; } } return ac; }
  function t(f,st,d,ty,v){ if(!on)return; const c=ctx(); if(!c)return; const o=c.createOscillator(),g=c.createGain(); o.type=ty||"sine"; o.frequency.value=f; o.connect(g); g.connect(c.destination); const s=c.currentTime+st; g.gain.setValueAtTime(.0001,s); g.gain.exponentialRampToValueAtTime(v||.12,s+.01); g.gain.exponentialRampToValueAtTime(.0001,s+d); o.start(s); o.stop(s+d+.02); }
  return { resume(){ const c=ctx(); if(c&&c.state==="suspended") c.resume(); },
    tap(){t(520,0,.07,"triangle",.07);}, right(){t(660,0,.1,"triangle",.12);t(990,.07,.1,"triangle",.09);}, wrong(){t(170,0,.25,"sawtooth",.1);},
    hit(){t(300,0,.08,"square",.09);}, crit(){t(520,0,.09,"square",.11);t(760,.05,.1,"square",.09);},
    coin(){t(880,0,.08,"square",.08);t(1180,.06,.1,"square",.06);}, catchok(){[523,659,880,1046].forEach((f,i)=>t(f,i*.08,.25,"triangle",.11));},
    levelup(){[523,659,784,1046,1318].forEach((f,i)=>t(f,i*.08,.3,"triangle",.12));}, win(){[523,659,784,1046,1318,1568].forEach((f,i)=>t(f,i*.1,.45,"triangle",.12));}, lose(){t(200,0,.4,"sawtooth",.1);} };
})();

  } else {

  }
  return {label:"free", sem:"mix", bias:"any"};
}

  const list=box.querySelector("#ball-list");
  Object.keys(BALLS).forEach(tp=>{ const b=BALLS[tp], cnt=balls[tp]||0; const row=document.createElement("button");
    row.className="shop-item"; row.style.width="100%"; row.style.border="none"; row.disabled=cnt<=0;
    row.innerHTML=`<div class="s-ic">${b.e}</div><div class="s-body"><div class="s-nm">${b.n}（成功率 ${Math.round(b.rate*100)}%）</div><div class="s-desc">擁有 ${cnt} 顆</div></div><div style="font-weight:900;">${cnt>0?"丟！":"沒了"}</div>`;
    if(cnt>0) row.onclick=()=>throwBall(tp); list.appendChild(row); });
  box.querySelector("#ball-skip").onclick=()=>{ closeModal("modal"); renderLevels(); };
}
function throwBall(tp){
  if(!useBall(tp)) return; const b=BALLS[tp]; const {sp,lvl}=curWild;
  const penalty={1:1,2:.92,3:.85,4:.78,5:.72,6:.66,7:.6,8:.55,9:.5,10:.45}[lvl]||.5;

  if(success){ addToParty(sp.id,lvl); addCoins(3); addExp(2); SFX.catchok(); startConfetti(1200);
    box.innerHTML=`<div style="text-align:center;"><span class="tag">🎉 收服成功！</span><div class="mon-art">${monVisual(sp,lvl)}</div><div class="mon-name">${sp.name} Lv${lvl} 加入隊伍！</div><div class="mon-meta">圖鑑進度 ${dexCount()}/990</div><div class="modal-actions"><button class="btn big" id="c-ok">太好了！</button></div></div>`;
    box.querySelector("#c-ok").onclick=()=>{ closeModal("modal"); renderLevels(); };
  } else { SFX.wrong();
    box.innerHTML=`<div style="text-align:center;"><span class="tag">💨 差一點！</span><div class="mon-art" style="filter:grayscale(.4) opacity(.75)">${monVisual(sp,lvl)}</div><div class="mon-name">${sp.name} 掙脫了…</div><div class="modal-actions">${anyBall()?`<button class="btn" id="c-retry">再丟一顆</button>`:""}<button class="btn ghost" id="c-give">放牠走</button></div></div>`;
    const rt=box.querySelector("#c-retry"); if(rt) rt.onclick=()=>chooseBall();
    box.querySelector("#c-give").onclick=()=>{ closeModal("modal"); renderLevels(); };
  }
}
function anyBall(){ const b=getBalls(); return (b.wood+b.silver+b.star)>0; }

/* ================= 對戰（動畫版） ================= */
const GYM_LEADERS=[{name:"磐岩",e:"🧔"},{name:"潮汐",e:"🧜‍♀️"},{name:"疾風",e:"🧙"},{name:"綠影",e:"🧝"},{name:"焱陽",e:"👨‍🚀"},{name:"夜曦",e:"🧛"}];
let bt=null;
function topParty(n){ return party().slice().sort((a,b)=>b.lvl-a.lvl).slice(0,n); }
function makeFighter(inst){ const sp=SPECIES[inst.sid]; const s=statAt(sp,inst.lvl); return { sid:inst.sid, lvl:inst.lvl, sp, hp:s.hp, maxhp:s.hp, ref:inst }; }
function ensureStarterThen(fn){
  if(party().length>0){ fn(); return; }
  // 沒有怪獸：先送一隻初始夥伴（答一題）
  const opts=["land","sea","air"].map(tp=>pick(SP_BY_TYPE[tp]));
  const box=modalBox();
  box.innerHTML=`<span class="tag">🌟 選擇你的初始夥伴</span><h3 style="text-align:center;">對戰需要怪獸！先選一隻收服牠</h3>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">${opts.map((sp,i)=>`
      <button class="lv-node" style="width:31%;min-width:96px;" data-i="${i}">
        <div class="mon-art" style="width:70px;height:70px;">${monVisual(sp,1)}</div>
        <div class="n-nm">${sp.name}</div>${typeChip(sp.type)}</button>`).join("")}</div>`;
  box.querySelectorAll("button[data-i]").forEach(b=>b.onclick=()=>{
    const sp=opts[+b.dataset.i];
    const q=nextQ(ST?ST.subject:"math", gsOf(curWorld,worldMode(curWorld)), "easy");
    box.innerHTML=`<span class="tag">✨ 收服 ${sp.name}</span><div class="mon-art">${monVisual(sp,1)}</div>
      <p style="text-align:center;font-weight:800;color:#5a6072;">答對就把牠收進隊伍！</p>
      <div class="q-text">${q.q}</div><div class="choices" id="stt-c"></div>`;
    renderChoices("stt-c",q,(ok)=>{ setTimeout(()=>{ if(ok){ addToParty(sp.id,1); addExp(2); SFX.catchok(); fn(); } else ensureStarterThen(fn); },700); });
  });
  openModal("modal");
}
function startBattle(kind){
  ensureStarterThen(()=>{
    let oppTeam, leader=null, title;
    if(kind==="boss"){
      const ls=party().map(m=>m.lvl).sort((a,b)=>b-a); const M=ls.length>=2?ls[1]:(ls[0]||1);
      const tp=pick(["land","sea","air"]); const pool=SP_BY_TYPE[tp];
      leader=pick(GYM_LEADERS);
      oppTeam=[M,Math.max(1,M-1),Math.max(1,M-1)].map(l=>makeFighter({sid:pick(pool).id,lvl:l}));
      title=`👑 ${leader.e} 魔王 ${leader.name} 的挑戰！`;
    } else {
      const avg=Math.max(1,Math.round(party().reduce((a,m)=>a+m.lvl,0)/Math.max(1,party().length)));
      const oc=rnd(1,2);
      oppTeam=[]; for(let i=0;i<oc;i++){ const tp=pick(["land","sea","air"]); oppTeam.push(makeFighter({sid:pick(SP_BY_TYPE[tp]).id,lvl:Math.max(1,Math.min(10,avg+rnd(-1,1)))})); }
      title=`⚔️ 訓練家對手來挑戰！`;
    }
    const pCount=Math.min(kind==="boss"?3:oppTeam.length, Math.max(1,party().length));
    const pTeam=topParty(pCount).map(makeFighter);
    bt={ kind, leader, title, pTeam, oTeam:oppTeam, pIdx:0, oIdx:0, oppMax:Math.max(...oppTeam.map(f=>f.lvl)) };
    renderBattle("");
    openModal("modal");
  });
}
function alive(t){ return t.filter(f=>f.hp>0).length; }
function dots(t,i){ return t.map((f,k)=>f.hp>0?(k===i?"🔵":"⚪"):"⚫").join(""); }
function hpPct(f){ return Math.max(0,Math.round(f.hp/f.maxhp*100)); }
function battleHTML(note){
  const p=bt.pTeam[bt.pIdx], o=bt.oTeam[bt.oIdx];
  return `<span class="tag">${bt.title}</span>
    <div class="arena">
      <div class="vs-wrap" id="vs-wrap">

function renderBattle(note){
  const box=modalBox();

/* 攻擊動畫序列：橫幅→衝鋒→招式飛行→受擊震動→傷害數字→血條 */
function animateAttack(playerAttacks){
  const p=bt.pTeam[bt.pIdx], o=bt.oTeam[bt.oIdx];
  const atk=playerAttacks?p:o, def=playerAttacks?o:p;
  const r=dmgOf(atk.sp,atk.lvl,def.sp,def.lvl);
  const mv=moveOf(atk.sp,atk.lvl);
  const banner=document.getElementById("move-banner");
  banner.textContent=`${atk.sp.name} 使出「${mv.name}」！${r.crit?"效果絕佳（+30%）！":""}`;
  const atkEl=document.getElementById(playerAttacks?"f-me":"f-opp");
  const defEl=document.getElementById(playerAttacks?"f-opp":"f-me");
  atkEl.classList.add(playerAttacks?"lunge-l":"lunge-r");
  const wrap=document.getElementById("vs-wrap");
  const proj=document.createElement("div");
  proj.className="proj "+(playerAttacks?"go-l":"go-r"); proj.textContent=mv.e;
  wrap.appendChild(proj);
  setTimeout(()=>{
    def.hp-=r.dmg;
    defEl.classList.add("hit-shake");
    r.crit?SFX.crit():SFX.hit();
    const dmg=document.createElement("div");
    dmg.className="dmg-float"+(r.crit?" crit":""); dmg.textContent="-"+r.dmg;
    dmg.style[playerAttacks?"left":"right"]="18%";
    wrap.appendChild(dmg);
    const hpEl=document.getElementById(playerAttacks?"hp-opp":"hp-me");
    hpEl.style.width=hpPct(def)+"%"; if(hpPct(def)<35) hpEl.classList.add("low");
    setTimeout(()=>{
      let note="";
      if(def.hp<=0){
        if(playerAttacks){ if(bt.oIdx<bt.oTeam.length-1){ bt.oIdx++; note=`對手換上 ${bt.oTeam[bt.oIdx].sp.name}！`; } }
        else { if(bt.pIdx<bt.pTeam.length-1){ bt.pIdx++; note=`你換上 ${bt.pTeam[bt.pIdx].sp.name}！`; } }
      }
      if(alive(bt.oTeam)===0) battleEnd(true);
      else if(alive(bt.pTeam)===0) battleEnd(false);
      else renderBattle(note);
    }, 900);
  }, 520);
}
function battleEnd(win){
  const box=modalBox();
  if(win){
    const leveled=[]; const {all,d}=rdata(P);
    bt.pTeam.forEach(f=>{ const inst=d.party.find(m=>m.uid===f.ref.uid); if(!inst) return;
      if(bt.oppMax>=inst.lvl && inst.lvl<10){ inst.wins=(inst.wins||0)+1; if(inst.wins>=5){ inst.wins=0; inst.lvl++; if(!d.maxLvl[inst.sid]||d.maxLvl[inst.sid]<inst.lvl) d.maxLvl[inst.sid]=inst.lvl; leveled.push(SPECIES[inst.sid].name+" → Lv"+inst.lvl); } } });
    saveAll(all);
    addExp(3);
    if(bt.kind==="boss"){
      giveBadge(curWorld); addCoins(30); SFX.win(); startConfetti(2500);
      box.innerHTML=`<div style="text-align:center;"><span class="tag">🏅 魔王被擊敗！</span><div style="font-size:52px;">${bt.leader.e}👑</div>
        <div class="mon-name">取得 ${curWorld} 年級世界徽章！</div>
        <div class="mon-meta">🪙+30 · 經驗+3 ${leveled.length?"· ⬆️ "+leveled.join("、"):""}</div>
        <div class="modal-actions"><button class="btn big" id="be-ok">太強了！</button></div></div>`;
      box.querySelector("#be-ok").onclick=()=>{ closeModal("modal"); stopConfetti(); renderLevels(); renderWorlds&&renderWorlds(); };
    } else {
      addCoins(10); SFX.win();
      box.innerHTML=`<div style="text-align:center;"><span class="tag">⚔️ 對戰勝利！</span><div style="font-size:46px;">🎉</div>
        <div class="mon-meta">🪙+10 · 經驗+3 ${leveled.length?"· ⬆️ "+leveled.join("、"):""}</div>
        <div class="modal-actions"><button class="btn big" id="be-ok">繼續！</button></div></div>`;
      box.querySelector("#be-ok").onclick=()=>{ stageResult("· ⚔️打贏對手"); };
    }
  } else {
    addExp(2); SFX.lose();
    const isBoss=bt.kind==="boss";
    box.innerHTML=`<div style="text-align:center;"><span class="tag">😵 這次輸了…</span><div style="font-size:46px;">💫</div>
      <div class="mon-meta">經驗+2。抓更多怪、多過關升級，再來挑戰！</div>
      <div class="modal-actions">${isBoss?`<button class="btn" id="be-retry">再挑戰魔王</button>`:""}<button class="btn ghost" id="be-ok">${isBoss?"先離開":"繼續"}</button></div></div>`;
    const rt=box.querySelector("#be-retry"); if(rt) rt.onclick=()=>startBattle("boss");
    box.querySelector("#be-ok").onclick=()=>{ if(isBoss){ closeModal("modal"); renderLevels(); } else stageResult("· 對手太強，下次再贏他"); };
  }
}
function openBossIntro(){

  const ls=party().map(m=>m.lvl).sort((a,b)=>b-a); const M=ls.length>=2?ls[1]:(ls[0]||1);
  box.innerHTML=`<span class="tag">👑 世界魔王</span><h3 style="text-align:center;">${hasBadge(curWorld)?"你已擊敗過魔王 🏅":"最終挑戰！"}</h3>

    <div class="modal-actions"><button class="btn big" id="boss-go">${hasBadge(curWorld)?"再戰一次":"挑戰魔王！"}</button><button class="btn ghost" onclick="closeModal('modal')">還沒準備好</button></div>`;

function openShop(inStage){
  const box=modalBox();
  function draw(){ const balls=getBalls();
    box.innerHTML=`<span class="tag">🛒 捕獸珠商店</span><h3 style="text-align:center;">🪙 金幣：${getCoins()}</h3><div id="shop-list"></div><div class="modal-actions"><button class="btn" id="shop-close">離開商店</button></div>`;
    const list=box.querySelector("#shop-list");

function renderChoices(cid,q,cb){
  curQ=q; const box=document.getElementById(cid); box.innerHTML="";

    b.disabled=true; b.style.opacity=".45";

      if(ok){ b.classList.add("ok"); SFX.right(); } else { b.classList.add("no"); SFX.wrong(); box.querySelectorAll(".choice").forEach(x=>{ if(x.textContent===q.a) x.classList.add("ok"); }); scheduleRetry(q,ST?ST.subject:"math"); }
      cb(ok); };
    box.appendChild(b); });
  setTimeout(()=>{ box.querySelectorAll(".choice").forEach(x=>{ x.disabled=false; x.style.opacity="1"; }); },250);
}

/* ================= 彩帶 ================= */
const canvas=document.getElementById("confetti"), cctx=canvas.getContext("2d");
let pieces=[], ctimer=null;
const CC=["#f6b40e","#2fae60","#3a6df0","#7c4dff","#ff6b6b","#ff9f43","#00d2d3"], CE=["⭐","✨","🎉","🏆","💎"];
function rs(){ canvas.width=innerWidth; canvas.height=innerHeight; } addEventListener("resize",rs);
function mkPiece(mode){ const r=Math.random(); const shape=r<.55?"rect":(r<.8?"circle":"emoji");
  const p={shape,color:CC[Math.floor(Math.random()*CC.length)],emoji:CE[Math.floor(Math.random()*CE.length)],size:9+Math.random()*11,angle:Math.random()*6.28,spin:(Math.random()-.5)*.3,sway:.5+Math.random()*1.5};
  if(mode==="burst"){ const a=Math.random()*6.28,sp=6+Math.random()*10; p.x=canvas.width/2; p.y=canvas.height*.4; p.vx=Math.cos(a)*sp; p.vy=Math.sin(a)*sp-4; p.grav=.18; p.burst=true; }
  else{ p.x=Math.random()*canvas.width; p.y=Math.random()*-canvas.height; p.vy=2+Math.random()*4; p.grav=0; } return p; }
function startConfetti(ms){ rs(); canvas.style.display="block"; pieces=[];
  for(let i=0;i<110;i++) pieces.push(mkPiece("rain")); for(let i=0;i<80;i++) pieces.push(mkPiece("burst"));
  if(ctimer) cancelAnimationFrame(ctimer);
  (function loop(){ cctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{ if(p.burst){ p.vy+=p.grav; p.vx*=.99; p.x+=p.vx; p.y+=p.vy; } else { p.y+=p.vy; p.x+=Math.sin(p.y*.02)*p.sway; if(p.y>canvas.height+20){ p.y=-20; p.x=Math.random()*canvas.width; } } p.angle+=p.spin;
      cctx.save(); cctx.translate(p.x,p.y); cctx.rotate(p.angle);
      if(p.shape==="rect"){ cctx.fillStyle=p.color; cctx.fillRect(-p.size/2,-p.size*.7,p.size,p.size*1.4); }
      else if(p.shape==="circle"){ cctx.fillStyle=p.color; cctx.beginPath(); cctx.arc(0,0,p.size*.55,0,6.28); cctx.fill(); }
      else{ cctx.font=(p.size*1.8)+"px serif"; cctx.textAlign="center"; cctx.textBaseline="middle"; cctx.fillText(p.emoji,0,0); }
      cctx.restore(); });
    ctimer=requestAnimationFrame(loop); })();
  if(ms) setTimeout(stopConfetti,ms);
}
function stopConfetti(){ if(ctimer) cancelAnimationFrame(ctimer); ctimer=null; cctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display="none"; }
