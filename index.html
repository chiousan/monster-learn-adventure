<!DOCTYPE html>
<html lang="zh-Hant">

<title>🎮 原創怪獸學習冒險</title>
<!-- ============================================================
     原創怪獸學習冒險（單檔，iPad Safari 直接開，進度存 localStorage）
     ● 三科世界(數學/國語/英文)＋地形分系：森林=陸、湖泊=海、高山=空
     ● 陸海空相剋：空剋陸、陸剋海、海剋空；剋到對方 → 對方受傷 +30%
     ● 99 種原創怪獸(陸海空各33)×10級=990 圖鑑格；怪獸即時生成 SVG(檔案小、跑得順)
     ● 學習核心：抓怪與對戰都要答對題目；戰勝同級 5 次 → 升 1 級
     ● 想換成自己的圖：見下方 SPECIES_IMAGES 說明
     ============================================================ -->
<style>

  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{font-family:"PingFang TC","Heiti TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;color:var(--ink);

  body.theme-g1{--main:var(--g1-main);--accent:var(--g1-accent);--dark:var(--g1-dark);background:linear-gradient(135deg,#fff6dd,#e8fbe9);}
  body.theme-g3{--main:var(--g3-main);--accent:var(--g3-accent);--dark:var(--g3-dark);background:linear-gradient(135deg,#e7efff,#efe8ff);}
  button{font-family:inherit;cursor:pointer;}
  .page{display:none;min-height:100dvh;padding:16px clamp(12px,3vw,40px);animation:fade .3s ease;}
  .page.active{display:flex;flex-direction:column;}

  .btn{border:none;border-radius:999px;font-weight:900;font-size:clamp(15px,2.3vw,19px);padding:13px 24px;color:#fff;
    background:linear-gradient(120deg,var(--main,#f6b40e),var(--accent,#2fae60));box-shadow:0 6px 16px rgba(0,0,0,.16);transition:transform .12s;}
  .btn:active{transform:scale(.94);} .btn.ghost{background:#fff;color:var(--ink);box-shadow:0 4px 12px rgba(0,0,0,.1);}
  .btn.big{font-size:clamp(17px,2.8vw,22px);padding:16px 30px;} .btn:disabled{opacity:.5;}
  #page-home{align-items:center;justify-content:center;text-align:center;}
  .home-title{font-size:clamp(26px,6vw,50px);font-weight:900;margin:0 0 4px;background:linear-gradient(90deg,#f6b40e,#2fae60,#3a6df0,#7c4dff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .home-sub{font-size:clamp(14px,2.5vw,20px);color:#5a6072;font-weight:800;margin:0 0 26px;}
  .card-wrap{display:flex;gap:clamp(14px,3vw,30px);flex-wrap:wrap;justify-content:center;width:100%;max-width:900px;}
  .role-card{flex:1 1 300px;max-width:420px;min-height:250px;border:none;border-radius:var(--radius);padding:24px 20px;color:#fff;box-shadow:var(--shadow);transition:transform .16s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}

  .role-card .emoji{font-size:clamp(54px,10vw,86px);animation:floaty 3s ease-in-out infinite;}

  .role-card .badge{font-size:14px;font-weight:900;background:rgba(255,255,255,.28);padding:5px 14px;border-radius:999px;}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
  .card-g1{background:linear-gradient(150deg,var(--g1-main),var(--g1-accent));}
  .card-g3{background:linear-gradient(150deg,var(--g3-main),var(--g3-accent));}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}

  .menu-card .m-emoji{font-size:clamp(36px,7vw,52px);} .menu-card .m-title{font-size:clamp(17px,3vw,24px);font-weight:900;}

  .dmg-note{text-align:center;font-size:14px;font-weight:900;min-height:1.3em;color:var(--dark);}

  .dex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;}

  .dex-art{width:100%;aspect-ratio:1/1;} .dex-art svg,.dex-art img{width:100%;height:100%;object-fit:contain;} .dex-art.unknown{display:flex;align-items:center;justify-content:center;font-size:28px;color:#c3c9da;}
  .dex-nm{font-size:10px;font-weight:800;margin-top:2px;} .dex-lv{font-size:10px;font-weight:900;color:var(--dark);}
  .party-row{display:flex;align-items:center;gap:10px;background:#f7f9fd;border-radius:12px;padding:8px 10px;margin:6px 0;}
  .party-row .p-art{width:44px;height:44px;} .party-row .p-art svg{width:100%;height:100%;} .party-row .p-body{flex:1;text-align:left;} .party-row .p-nm{font-weight:900;font-size:15px;}
  .party-row .p-sub{font-size:11px;color:#5a6072;font-weight:700;}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:75;display:none;}

  @media (max-width:420px){.choices{grid-template-columns:1fr;}}

<script>
"use strict";
/* ============================================================
   ★ 想換成自己的怪獸圖：在這裡填  物種編號: "圖片路徑或網址"
     例： SPECIES_IMAGES[0] = "images/0.png";
     沒填的用內建原創 SVG。圖檔請放此 HTML 旁的 images/ 資料夾。
   ============================================================ */
const SPECIES_IMAGES = {};

/* ---------- 系別與相剋 ---------- */
const TYPES = {
  land:{ n:"陸", key:"land", terrain:"forest", tName:"森林", tIcon:"🌳", hue:120 },
  sea :{ n:"海", key:"sea",  terrain:"lake",   tName:"湖泊", tIcon:"🏞️", hue:205 },
  air :{ n:"空", key:"air",  terrain:"mount",  tName:"高山", tIcon:"⛰️", hue:280 }
};
const BEATS = { air:"land", land:"sea", sea:"air" };      // 攻方剋守方 → 傷害 x1.3
const TERRAIN_TYPE = { forest:"land", lake:"sea", mount:"air" };

/* ---------- 99 種原創怪獸（陸海空各33，動物命名） ---------- */
const ANIMALS = {
  land:["熊","虎","兔","狼","鹿","豬","牛","羊","獅","貓","鼠"],
  sea :["鯉","鯊","龜","蝦","蟹","鯨","豚","章魚","水母","河豚","海馬"],
  air :["鷹","蝶","鳥","蜂","鶴","燕","鴉","鸚","梟","隼","鳳"]
};
// 每隻怪獸用對應動物 emoji 當主體 → 一眼看得出是熊/魚/鳥（原創、免版權、檔案小）
const EMOJI = {
  land:["🐻","🐯","🐰","🐺","🦌","🐷","🐮","🐑","🦁","🐱","🐭"],
  sea :["🐟","🦈","🐢","🦐","🦀","🐋","🐬","🐙","🪼","🐡","🐠"],
  air :["🦅","🦋","🐦","🐝","🕊️","🐤","🐧","🦜","🦉","🦆","🦚"]
};
const PREFIX = {
  land:["泡泡","硬殼","蓬蓬"], sea:["水花","珍珠","深海"], air:["旋風","閃電","彩羽"]
};
const SPECIES = [];
["land","sea","air"].forEach(type=>{
  for(let k=0;k<33;k++){
    const animal=ANIMALS[type][k%11], prefix=PREFIX[type][Math.floor(k/11)];
    const id=SPECIES.length;
    const hue=TYPES[type].hue + ((k%11)-5)*7 + Math.floor(k/11)*4;
    SPECIES.push({ id, type, name:prefix+animal, emoji:EMOJI[type][k%11], shape:id%8, hue,
      baseHP:20+(id%5)*2, baseATK:8+(id%4), baseDEF:6+(id%3) });
  }
});
const SP_BY_TYPE = { land:SPECIES.filter(s=>s.type==="land"), sea:SPECIES.filter(s=>s.type==="sea"), air:SPECIES.filter(s=>s.type==="air") };

/* ---------- 數值：等級成長（每級 +15%，系別專屬 stat 額外 +15%=共30%） ---------- */
function statAt(sp,lvl){
  const t=sp.type, L=lvl-1;
  const hf=Math.pow(t==="land"?1.30:1.15,L), af=Math.pow(t==="sea"?1.30:1.15,L), df=Math.pow(t==="air"?1.30:1.15,L);
  return { hp:Math.round(sp.baseHP*hf), atk:Math.round(sp.baseATK*af), def:Math.round(sp.baseDEF*df) };
}
function dmgOf(attSp,attLvl,defSp,defLvl){
  const a=statAt(attSp,attLvl).atk, d=statAt(defSp,defLvl).def;
  const mult=(BEATS[attSp.type]===defSp.type)?1.3:1.0;
  return { dmg:Math.max(1,Math.round(a*mult - d*0.4)), crit:mult>1 };
}

/* ---------- 怪獸圖：以「對應動物」為主體，放在系別配色的光球上，等級越高越華麗 ----------
   （原創：標準 emoji 動物＋自繪光球/光環/皇冠；一眼看得出是熊/魚/鳥。想換自己的圖見 SPECIES_IMAGES） */
function monsterSVG(sp,lvl){
  lvl=lvl||1;
  const gid="mg"+sp.id+"_"+lvl;
  const c1=`hsl(${sp.hue},70%,60%)`, c2=`hsl(${sp.hue},82%,84%)`, dk=`hsl(${sp.hue},55%,32%)`;
  const aura = lvl>=6 ? `<circle cx="60" cy="56" r="53" fill="none" stroke="${c2}" stroke-width="3.5" opacity=".65"/>` : "";

function scheduleRetry(q,subject){
  const clean=q.q.replace(/^🔁 /,"");
  if(retryQueue.some(r=>r.q.q===clean)) return;          // 同一題不重複排隊
  retryQueue.push({ q:{q:clean,a:q.a,choices:q.choices}, subject, dueAt:qCount+rnd(2,5) });
  if(retryQueue.length>10) retryQueue.shift();           // 佇列上限，避免無限累積
}
function nextQ(subject){
  qCount++;
  const idx=retryQueue.findIndex(r=>r.subject===subject && qCount>=r.dueAt);
  if(idx>=0){ const r=retryQueue.splice(idx,1)[0]; return { q:"🔁 "+r.q.q, a:r.q.a, choices:shuffle(r.q.choices) }; }
  if(subject==="math") return genMath(role); const arr=BANK[role][subject]; return arr[rnd(0,arr.length-1)];
}

function rdata(r){
  const all=loadAll();
  if(!all[r]) all[r]={ trainerExp:0, coins:15, balls:{wood:5,silver:0,star:0}, party:[], maxLvl:{}, unlocked:1, gymBeaten:[], starterPicked:false };
  const d=all[r]; d.balls=d.balls||{wood:5,silver:0,star:0}; d.party=d.party||[]; d.maxLvl=d.maxLvl||{}; d.gymBeaten=d.gymBeaten||[];
  if(typeof d.trainerExp!=="number") d.trainerExp=0; if(typeof d.coins!=="number") d.coins=15; if(typeof d.unlocked!=="number") d.unlocked=1;
  return { all, d };
}

/* ---------- 音效 ---------- */
const SFX=(()=>{ let ac=null,on=true;
  function ctx(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ on=false; } } return ac; }
  function t(f,st,d,ty,v){ if(!on)return; const c=ctx(); if(!c)return; const o=c.createOscillator(),g=c.createGain(); o.type=ty||"sine"; o.frequency.value=f; o.connect(g); g.connect(c.destination); const s=c.currentTime+st; g.gain.setValueAtTime(.0001,s); g.gain.exponentialRampToValueAtTime(v||.12,s+.01); g.gain.exponentialRampToValueAtTime(.0001,s+d); o.start(s); o.stop(s+d+.02); }
  return { resume(){ const c=ctx(); if(c&&c.state==="suspended") c.resume(); },
    tap(){t(520,0,.07,"triangle",.07);}, dice(){[400,300,500,350].forEach((f,i)=>t(f,i*.05,.06,"square",.06));},
    right(){t(660,0,.1,"triangle",.12);t(990,.07,.1,"triangle",.09);}, wrong(){t(170,0,.25,"sawtooth",.1);},
    hit(){t(300,0,.08,"square",.09);}, crit(){t(520,0,.09,"square",.11);t(760,.05,.1,"square",.09);},
    coin(){t(880,0,.08,"square",.08);t(1180,.06,.1,"square",.06);}, catchok(){[523,659,880,1046].forEach((f,i)=>t(f,i*.08,.25,"triangle",.11));},
    levelup(){[523,659,784,1046,1318].forEach((f,i)=>t(f,i*.08,.3,"triangle",.12));}, win(){[523,659,784,1046,1318,1568].forEach((f,i)=>t(f,i*.1,.45,"triangle",.12));}, lose(){t(200,0,.4,"sawtooth",.1);} };
})();

function placeToken(tid,i,instant){
  const board=document.getElementById("board"); const tile=board.querySelector(`.tile[data-index="${i}"]`); const tk=document.getElementById(tid);
  if(!tile||!tk) return; if(instant) tk.style.transition="none"; else tk.style.transition="";

function rollDice(){
  if(busy) return; if(party().length===0){ setMsg("先選一隻初始夥伴！"); starterSelect(); return; }
  busy=true; SFX.dice(); const dice=document.getElementById("dice"); dice.classList.add("rolling");
  const val=1+Math.floor(Math.random()*6); const faces=["⚀","⚁","⚂","⚃","⚄","⚅"]; let f=0;
  const sp=setInterval(()=>{ dice.textContent=faces[Math.floor(Math.random()*6)]; if(++f>7){ clearInterval(sp); dice.textContent=faces[val-1]; dice.classList.remove("rolling"); movePlayer(val); } },70);
}
function movePlayer(steps){
  setMsg(`前進 ${steps} 格！`); let left=steps, lap=false;
  const iv=setInterval(()=>{ pPos=(pPos+1)%RING.length; placeToken("token",pPos); SFX.tap();
    if(pPos===0){ addCoins(3); addBall("wood",1); lap=true; SFX.coin(); }
    if(--left<=0){ clearInterval(iv); const after=()=>{ if(pPos===rivalPos) startBattle("rival"); else resolveTile(pPos); };
      if(lap){ setMsg("🎉 繞完一圈！獲得 🟢木靈珠 ×1（＋3🪙）"); setTimeout(after,1100); } else setTimeout(after,220); } },230);

function resolveTile(i){
  const t=tiles[i].type;
  if(t==="start"){ setMsg("🏠 出發點，補給站。"); endTurn(); }
  else if(t==="shop"){ openShop(); }
  else if(t==="gym"){ openGymIntro(); }
  else encounter(TERRAIN_TYPE[t]);   // forest/lake/mount → land/sea/air
}
function endTurn(){
  const val=1+Math.floor(Math.random()*6); let left=val;
  const iv=setInterval(()=>{ rivalPos=(rivalPos+1)%RING.length; placeToken("token-rival",rivalPos);
    if(--left<=0){ clearInterval(iv); if(rivalPos===pPos){ setMsg(`${REGIONS[region].rival} 對手追上你了！`); setTimeout(()=>startBattle("rival"),500); } else busy=false; } },190);
}

/* ============================================================ 對戰（3v3） */
let bt=null;
function topParty(n){ return party().slice().sort((a,b)=>b.lvl-a.lvl).slice(0,n); }
function makeFighter(inst){ const sp=SPECIES[inst.sid]; const s=statAt(sp,inst.lvl); return { sid:inst.sid, lvl:inst.lvl, sp, hp:s.hp, maxhp:s.hp, ref:inst }; }
function startBattle(kind){
  closeModal("modal");
  let oppTeam, leader=null;
  if(kind==="gym"){
    const ls=party().map(m=>m.lvl).sort((a,b)=>b-a); const M=ls.length>=2?ls[1]:(ls[0]||1);
    const tp=["land","sea","air"][rnd(0,2)]; const pool=SP_BY_TYPE[tp];
    leader=GYM_LEADERS[rnd(0,GYM_LEADERS.length-1)];
    oppTeam=[M,Math.max(1,M-1),Math.max(1,M-1)].map(l=>makeFighter({sid:pool[rnd(0,pool.length-1)].id,lvl:l}));
  } else {
    const oc=rnd(1,3); const avg=Math.max(1,Math.round(party().reduce((a,m)=>a+m.lvl,0)/Math.max(1,party().length)));
    oppTeam=[]; for(let i=0;i<oc;i++){ const tp=["land","sea","air"][rnd(0,2)]; const pool=SP_BY_TYPE[tp]; oppTeam.push(makeFighter({sid:pool[rnd(0,pool.length-1)].id,lvl:Math.max(1,Math.min(10,avg+rnd(-1,1)))})); }
  }
  const pCount=Math.min(oppTeam.length, party().length); // 你不能比對手多
  const pTeam=topParty(pCount).map(makeFighter);
  bt={ kind, leader, pTeam, oTeam:oppTeam, pIdx:0, oIdx:0, oppMax:Math.max(...oppTeam.map(f=>f.lvl)) };
  renderBattle(kind==="gym"?`🏛️ ${leader.name} 的道館挑戰！`:`${REGIONS[region].rival} 對手來襲！`, "");
  openModal("modal");
}

function dots(team,idx){ return team.map((f,i)=>f.hp>0?(i===idx?"🔵":"⚪"):"⚫").join(""); }
function hpPct(f){ return Math.max(0,Math.round(f.hp/f.maxhp*100)); }
function renderBattle(title,note){
  const p=bt.pTeam[bt.pIdx], o=bt.oTeam[bt.oIdx];
  const q=nextQ(REGIONS[region].subject); const box=modalBox();
  box.innerHTML=`<span class="tag">${title}</span>
    <div class="vs-wrap">
      <div class="fighter"><div class="f-art">${monVisual(o.sp,o.lvl)}</div><div class="f-nm">${o.sp.name} Lv${o.lvl}</div>
        <div class="hpbar2"><i class="${hpPct(o)<35?'low':''}" style="width:${hpPct(o)}%"></i></div>
        <div class="team-dots">對手 ${dots(bt.oTeam,bt.oIdx)}</div></div>
      <div class="vs-mid">VS</div>
      <div class="fighter"><div class="f-art">${monVisual(p.sp,p.lvl)}</div><div class="f-nm">${p.sp.name} Lv${p.lvl}</div>
        <div class="hpbar2"><i class="${hpPct(p)<35?'low':''}" style="width:${hpPct(p)}%"></i></div>
        <div class="team-dots">你的 ${dots(bt.pTeam,bt.pIdx)}</div></div>
    </div>
    <div class="dmg-note" id="dmg-note">${note||`${BEATS[p.sp.type]===o.sp.type?"⚡ 你剋制對方！":""}`}</div>
    <div class="q-text">${q.q}</div><div class="choices" id="bt-c"></div>`;
  renderChoices("bt-c",q,(ok)=>{
    let note2="";
    if(ok){ const r=dmgOf(p.sp,p.lvl,o.sp,o.lvl); o.hp-=r.dmg; r.crit?SFX.crit():SFX.hit(); note2=`⚔️ ${p.sp.name} 攻擊！造成 ${r.dmg} 傷害${r.crit?"（剋制 +30%！）":""}`; }
    else { const r=dmgOf(o.sp,o.lvl,p.sp,p.lvl); p.hp-=r.dmg; SFX.wrong(); note2=`😵 答錯！${o.sp.name} 反擊，你受 ${r.dmg} 傷害${r.crit?"（牠剋制你）":""}`; }
    setTimeout(()=>{
      if(o.hp<=0){ if(bt.oIdx<bt.oTeam.length-1){ bt.oIdx++; note2+=` 對手換上 ${bt.oTeam[bt.oIdx].sp.name}！`; } }
      if(p.hp<=0){ if(bt.pIdx<bt.pTeam.length-1){ bt.pIdx++; note2+=` 你換上 ${bt.pTeam[bt.pIdx].sp.name}！`; } }
      if(alive(bt.oTeam)===0) battleEnd(true);
      else if(alive(bt.pTeam)===0) battleEnd(false);
      else renderBattle(title,note2);
    }, ok?650:850);
  });
}
function battleEnd(win){
  const box=modalBox();
  if(win){
    // 升級：參戰怪獸戰勝同級(對手最高級≥自己)→+1勝，滿5升級
    const leveled=[]; const {all,d}=rdata(role);
    bt.pTeam.forEach(f=>{ const inst=d.party.find(m=>m.uid===f.ref.uid); if(!inst) return;
      if(bt.oppMax>=inst.lvl && inst.lvl<10){ inst.wins=(inst.wins||0)+1; if(inst.wins>=5){ inst.wins=0; inst.lvl++; bumpMax(inst.sid,inst.lvl,d); leveled.push(SPECIES[inst.sid].name+" → Lv"+inst.lvl); } } });
    saveAll(all);
    addTrainerExp(3); const reward=bt.kind==="gym"?25:10; addCoins(reward);
    if(leveled.length) SFX.levelup(); else SFX.win(); startConfetti(1800);
    if(bt.kind==="gym"){ markGym(REGIONS[region].key);
      box.innerHTML=`<div style="text-align:center;"><span class="tag">🏆 道館攻略成功！</span><div style="font-size:52px;">${bt.leader.e}🏛️</div>
        <div class="mon-name">打敗 ${bt.leader.name}！</div>
        <div class="mon-meta">🪙 +25 · 訓練師經驗 +3 · 取得 ${REGIONS[region].name} 徽章 🏅</div>
        ${leveled.length?`<div class="mon-meta" style="color:var(--dark);">⬆️ ${leveled.join("、")}</div>`:""}
        <div class="modal-actions"><button class="btn big" id="g-ok">太強了！</button></div></div>`;
      box.querySelector("#g-ok").onclick=()=>{ closeModal("modal"); stopConfetti(); renderRegions(); go("page-region"); };
    } else {
      box.innerHTML=`<div style="text-align:center;"><span class="tag">⚔️ 對戰勝利！</span><div style="font-size:48px;">🎉</div>
        <div class="mon-name">你贏了對手！</div><div class="mon-meta">🪙 +10 · 訓練師經驗 +3</div>
        ${leveled.length?`<div class="mon-meta" style="color:var(--dark);">⬆️ ${leveled.join("、")}</div>`:""}
        <div class="modal-actions"><button class="btn big" id="b-ok">繼續冒險</button></div></div>`;
      box.querySelector("#b-ok").onclick=()=>{ closeModal("modal"); rivalPos=(rivalPos+5)%RING.length; placeToken("token-rival",rivalPos,true); setMsg("打贏對手！繼續探索～"); busy=false; };
    }
  } else {
    addTrainerExp(2); SFX.lose();
    const isGym=bt.kind==="gym";
    box.innerHTML=`<div style="text-align:center;"><span class="tag">😵 這次輸了…</span><div style="font-size:48px;">💫</div>
      <div class="mon-name">你的怪獸全部倒下了</div><div class="mon-meta">訓練師經驗 +1。抓更多怪、升級後再挑戰！</div>
      <div class="modal-actions">${isGym?`<button class="btn" id="l-retry">再挑戰道館</button>`:""}<button class="btn ghost" id="l-ok">${isGym?"先離開":"繼續"}</button></div></div>`;
    const rt=box.querySelector("#l-retry"); if(rt) rt.onclick=()=>startBattle("gym");
    box.querySelector("#l-ok").onclick=()=>{ closeModal("modal"); if(!isGym){ rivalPos=(rivalPos+5)%RING.length; placeToken("token-rival",rivalPos,true); } setMsg("重整旗鼓，再出發！"); busy=false; };
  }
}

/* ============================================================ 道館入口 */
function openGymIntro(){
  const rg=REGIONS[region], beaten=gymBeaten(rg.key);
  const ls=party().map(m=>m.lvl).sort((a,b)=>b-a); const M=ls.length>=2?ls[1]:(ls[0]||1);
  const box=modalBox();
  box.innerHTML=`<span class="tag">🏛️ ${rg.name}道館</span><h3 style="text-align:center;">${beaten?"你已攻略過 🏅":"挑戰道館，贏得徽章與經驗！"}</h3>
    <p style="text-align:center;font-weight:800;color:#5a6072;line-height:1.6;">館主每次不同，會派出 <b>同一系列 3 隻</b> 怪獸，最高等級以你「第二高怪獸」為準（目前約 Lv${M}）。<br>你要派出 ${Math.min(3,party().length)} 隻（不多於對手）迎戰！</p>
    <div class="modal-actions"><button class="btn big" id="gym-go">${beaten?"再挑戰":"開始挑戰！"}</button><button class="btn ghost" id="gym-skip">還沒準備好</button></div>`;
  box.querySelector("#gym-go").onclick=()=>{ if(party().length===0){ setMsg("先抓幾隻怪獸再來！"); return; } startBattle("gym"); };
  box.querySelector("#gym-skip").onclick=()=>{ closeModal("modal"); setMsg("道館隨時歡迎你回來！"); endTurn(); };
  openModal("modal");
}

/* ============================================================ 商店 */
function openShop(){
  const box=modalBox();
  function draw(){ const balls=getBalls();
    box.innerHTML=`<span class="tag">🛒 捕獸珠商店</span><h3 style="text-align:center;">🪙 金幣：${getCoins()}</h3><div id="shop-list"></div><div class="modal-actions"><button class="btn" id="shop-close">離開商店</button></div>`;
    const list=box.querySelector("#shop-list");
    Object.keys(BALLS).forEach(tp=>{ const b=BALLS[tp], cnt=balls[tp]||0, can=getCoins()>=b.price; const row=document.createElement("div"); row.className="shop-item";
      row.innerHTML=`<div class="s-ic">${b.e}</div><div class="s-body"><div class="s-nm">${b.n}</div><div class="s-desc">成功率 ${Math.round(b.rate*100)}% · 擁有 ${cnt}</div></div><button class="btn" style="padding:8px 15px;font-size:14px;" ${can?"":"disabled"}>🪙${b.price}</button>`;
      row.querySelector("button").onclick=()=>{ if(getCoins()>=b.price){ addCoins(-b.price); addBall(tp,1); SFX.coin(); draw(); } }; list.appendChild(row); });
    box.querySelector("#shop-close").onclick=()=>{ closeModal("modal"); setMsg("補滿珠子，繼續抓怪！"); endTurn(); };
  }
  draw(); openModal("modal");
}

/* ---------- 選項渲染 ---------- */
function renderChoices(cid,q,cb){
  curQ=q; const box=document.getElementById(cid); box.innerHTML="";
  // 防呆：選項先以「半透明停用」出現 0.25 秒再開放，擋掉上一畫面穿透的點擊（iPad 幽靈點擊），
  // 且使用者看得到按鈕亮起，不會有「點了沒反應」的錯覺
  q.choices.forEach(ch=>{ const b=document.createElement("button"); b.className="choice"; b.textContent=ch;
    b.disabled=true; b.style.opacity=".45";
    b.onclick=()=>{ const ok=(ch===q.a); box.querySelectorAll(".choice").forEach(x=>x.disabled=true);
      if(ok){ b.classList.add("ok"); SFX.right(); } else { b.classList.add("no"); box.querySelectorAll(".choice").forEach(x=>{ if(x.textContent===q.a) x.classList.add("ok"); }); scheduleRetry(q,REGIONS[region].subject); }
      cb(ok); };
    box.appendChild(b); });
  setTimeout(()=>{ box.querySelectorAll(".choice").forEach(x=>{ x.disabled=false; x.style.opacity="1"; }); },250);
}

/* ============================================================ 隊伍 / 圖鑑 */
function openParty(){
  const p=party(); document.getElementById("party-title").textContent=`共 ${p.length} 隻`;
  const list=document.getElementById("party-list");
  if(!p.length){ list.innerHTML=`<p style="text-align:center;color:#6b7186;font-weight:700;">還沒有怪獸～進世界抓幾隻吧！</p>`; }
  else{ list.innerHTML=p.slice().sort((a,b)=>b.lvl-a.lvl).map(m=>{ const sp=SPECIES[m.sid], s=statAt(sp,m.lvl);
    return `<div class="party-row"><div class="p-art">${monVisual(sp,m.lvl)}</div><div class="p-body"><div class="p-nm">${sp.name} ${typeChip(sp.type)}</div><div class="p-sub">Lv${m.lvl} · ❤️${s.hp} ⚔️${s.atk} 🛡️${s.def} · 升級進度 ${m.wins||0}/5</div></div></div>`; }).join(""); }
  openModal("party-modal");
}
function openDex(){
  document.getElementById("dex-title").textContent=`已收集 ${dexCount()} / 990（99 種 × 10 級）`;
  const mx=rdata(role).d.maxLvl; const grid=document.getElementById("dex-grid"); grid.innerHTML="";
  SPECIES.forEach(sp=>{ const lv=mx[sp.id]||0; const have=lv>0; const it=document.createElement("div"); it.className="dex-item"+(have?" have":"");
    it.innerHTML=`<div class="dex-art ${have?"":"unknown"}">${have?monVisual(sp,lv):"❔"}</div><div class="dex-nm">#${sp.id} ${have?sp.name:"？？？"}</div><div class="dex-lv">${have?("Lv"+lv+"/10 "+TYPES[sp.type].n):"未捕獲"}</div>`;
    grid.appendChild(it); });
  openModal("dex-modal");
}

/* ============================================================ 彩帶 */
const canvas=document.getElementById("confetti"), cctx=canvas.getContext("2d");
let pieces=[], ctimer=null;
const CC=["#f6b40e","#2fae60","#3a6df0","#7c4dff","#ff6b6b","#ff9f43","#00d2d3"], CE=["⭐","✨","🎉","🏆","💎"];
function rs(){ canvas.width=innerWidth; canvas.height=innerHeight; } addEventListener("resize",rs);
function mkPiece(mode){ const r=Math.random(); const shape=r<.55?"rect":(r<.8?"circle":"emoji");
  const p={shape,color:CC[Math.floor(Math.random()*CC.length)],emoji:CE[Math.floor(Math.random()*CE.length)],size:9+Math.random()*11,angle:Math.random()*6.28,spin:(Math.random()-.5)*.3,sway:.5+Math.random()*1.5};
  if(mode==="burst"){ const a=Math.random()*6.28,sp=6+Math.random()*10; p.x=canvas.width/2; p.y=canvas.height*.4; p.vx=Math.cos(a)*sp; p.vy=Math.sin(a)*sp-4; p.grav=.18; p.burst=true; }
  else{ p.x=Math.random()*canvas.width; p.y=Math.random()*-canvas.height; p.vy=2+Math.random()*4; p.grav=0; } return p; }
function startConfetti(ms){ rs(); canvas.style.display="block"; pieces=[];
  for(let i=0;i<110;i++) pieces.push(mkPiece("rain")); for(let i=0;i<80;i++) pieces.push(mkPiece("burst"));
  if(ctimer) cancelAnimationFrame(ctimer);
  (function loop(){ cctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{ if(p.burst){ p.vy+=p.grav; p.vx*=.99; p.x+=p.vx; p.y+=p.vy; } else { p.y+=p.vy; p.x+=Math.sin(p.y*.02)*p.sway; if(p.y>canvas.height+20){ p.y=-20; p.x=Math.random()*canvas.width; } } p.angle+=p.spin;
      cctx.save(); cctx.translate(p.x,p.y); cctx.rotate(p.angle);
      if(p.shape==="rect"){ cctx.fillStyle=p.color; cctx.fillRect(-p.size/2,-p.size*.7,p.size,p.size*1.4); }
      else if(p.shape==="circle"){ cctx.fillStyle=p.color; cctx.beginPath(); cctx.arc(0,0,p.size*.55,0,6.28); cctx.fill(); }
      else{ cctx.font=(p.size*1.8)+"px serif"; cctx.textAlign="center"; cctx.textBaseline="middle"; cctx.fillText(p.emoji,0,0); }
      cctx.restore(); });
    ctimer=requestAnimationFrame(loop); })();
  if(ms) setTimeout(stopConfetti,ms);
}
function stopConfetti(){ if(ctimer) cancelAnimationFrame(ctimer); ctimer=null; cctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display="none"; }

/* ---------- 家長重置 ---------- */
const hot=document.getElementById("reset-hotspot");
hot.addEventListener("dblclick",()=>openModal("reset-modal"));
let lastTap=0; hot.addEventListener("touchend",e=>{ e.preventDefault(); const now=Date.now(); if(now-lastTap<350) openModal("reset-modal"); lastTap=now; });
function doReset(){ const all=loadAll(); delete all[role]; saveAll(all); closeModal("reset-modal"); rdata(role); refreshHUD(); renderRegions(); alert("已清除本訓練家的進度。"); }
addEventListener("resize",()=>{ if(document.getElementById("page-map").classList.contains("active")){ placeToken("token",pPos,true); placeToken("token-rival",rivalPos,true); } });
rs();
</script>
